<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <title>Verificador de Números</title>
</head>
<body>
    <main class="container">
        <h1>Verificador de Paridade e Sinal</h1>
        
        <form method="POST">
            <label for="numero">Digite um número inteiro:</label>
            <input type="number" id="numero" name="numero" placeholder="Ex: -5" required>
            <button type="submit">Verificar</button>
        </form>

        {% if paridade %}
            <article>
                <strong>Resultado:</strong> 
                O número {{ n }} é <u>{{ paridade }}</u> e <u>{{ sinal }}</u>.
            </article>
        {% endif %}

        {% if erro %}
            <article style="background-color: #f8d7da; color: #721c24;">
                {{ erro }}
            </article>
        {% endif %}
    </main>
</body>
</html>
